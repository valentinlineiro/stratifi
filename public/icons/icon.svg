<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252540"/>
      <stop offset="100%" stop-color="#0d0d1c"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#8b84ff"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b84ff"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b84ff"/>
      <stop offset="100%" stop-color="#ff6584"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect width="512" height="512" rx="108" fill="url(#bg)" opacity="0.4"/>
  <circle cx="256" cy="200" r="260" fill="#6c63ff" opacity="0.04"/>

  <!-- Stem -->
  <line x1="256" y1="390" x2="256" y2="252"
        stroke="url(#stemGrad)" stroke-width="42" stroke-linecap="round"/>

  <!-- Left branch -->
  <line x1="256" y1="252" x2="142" y2="138"
        stroke="url(#leftGrad)" stroke-width="42" stroke-linecap="round"/>

  <!-- Right branch -->
  <line x1="256" y1="252" x2="370" y2="138"
        stroke="url(#rightGrad)" stroke-width="42" stroke-linecap="round"/>

  <!-- Root node -->
  <circle cx="256" cy="390" r="36" fill="#6c63ff"/>
  <circle cx="256" cy="390" r="18" fill="#ddddf8"/>

  <!-- Junction node -->
  <circle cx="256" cy="252" r="26" fill="#7a73ff"/>
  <circle cx="256" cy="252" r="12" fill="#ffffff"/>

  <!-- Left end node -->
  <circle cx="142" cy="138" r="32" fill="#6c63ff"/>
  <circle cx="142" cy="138" r="16" fill="#a09bff"/>

  <!-- Right end node -->
  <circle cx="370" cy="138" r="32" fill="#ff6584"/>
  <circle cx="370" cy="138" r="16" fill="#ff9db3"/>
</svg>
