<div class="app-shell">
  <header class="app-header">
    @if (header.backPath()) {
      <a class="btn-back" [routerLink]="header.backPath()" aria-label="Go back">
        <span class="material-symbols-rounded">arrow_back</span>
      </a>
    }
    <span class="app-title" [class.is-logo]="!header.backPath()">
      {{ header.title() }}
    </span>
  </header>

  <main class="app-content">
    <router-outlet />
  </main>

  <app-bottom-nav />
</div>
