<nav class="bottom-nav">
  @for (item of items(); track item.path) {
    <a
      class="nav-item"
      [routerLink]="item.path"
      routerLinkActive="active"
    >
      <span class="material-symbols-rounded">{{ item.icon }}</span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  }
</nav>
