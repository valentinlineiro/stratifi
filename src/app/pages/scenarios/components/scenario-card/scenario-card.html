<div class="scenario-card" appSwipeDelete (deleted)="delete.emit(scenario().id)">
  <div class="card-accent"></div>
  <div class="card-body">
    <div class="card-top">
      <h3 class="card-title">{{ scenario().title }}</h3>
      <div class="card-actions">
        @if (hasOutcomes) {
          <app-radar-chart [values]="scenario().outcomes" [size]="72" />
        }
        <button
          class="btn-delete"
          aria-label="Delete scenario"
          (click)="delete.emit(scenario().id)"
        >
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
    </div>
    @if (scenario().notes) {
      <p class="card-notes">{{ scenario().notes }}</p>
    }
    <div class="card-footer">
      <div class="confidence-bar-wrap">
        <span class="confidence-label">{{ t().scenarios.confidenceLabel }}</span>
        <div class="confidence-bar">
          <div class="confidence-fill" [style.width.%]="scenario().confidence"></div>
        </div>
        <span class="confidence-pct">{{ scenario().confidence }}%</span>
      </div>
    </div>
  </div>
</div>
