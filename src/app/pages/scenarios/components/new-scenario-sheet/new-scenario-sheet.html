<div class="sheet-backdrop" (click)="cancel.emit()"></div>

<div class="sheet">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">{{ t().scenarios.newTitle }}</h2>

  <form class="sheet-form" (ngSubmit)="submit()">
    @if (!preselectedDecisionId()) {
      <div class="field">
        <label class="field-label" for="decision">{{ t().scenarios.decision }}</label>
        <select id="decision" class="field-input field-select"
          [ngModel]="decisionId()" (ngModelChange)="decisionId.set($event)" name="decisionId">
          <option value="" disabled>{{ t().common.selectDecision }}</option>
          @for (d of decisions(); track d.id) {
            <option [value]="d.id">{{ d.title }}</option>
          }
        </select>
      </div>
    }

    <div class="field">
      <label class="field-label" for="title">{{ t().scenarios.question }}</label>
      <input id="title" class="field-input" type="text"
        [placeholder]="t().scenarios.questionPlaceholder"
        [ngModel]="title()" (ngModelChange)="title.set($event)" name="title" />
    </div>

    <div class="field">
      <label class="field-label" for="notes">{{ t().scenarios.notes }}</label>
      <textarea id="notes" class="field-input field-textarea"
        [placeholder]="t().scenarios.notesPlaceholder"
        [ngModel]="notes()" (ngModelChange)="notes.set($event)" name="notes" rows="2">
      </textarea>
    </div>

    <div class="field">
      <label class="field-label">{{ t().scenarios.outcomeScores }}</label>
      <div class="axis-rows">
        @for (axis of axes; track axis.key) {
          <div class="axis-row">
            <span class="axis-label">{{ $any(t().outcomes)[axis.key] }}</span>
            <div class="score-dots">
              @for (n of scores; track n) {
                <button type="button" class="score-dot"
                  [class.active]="outcomes()[axis.key] === n"
                  (click)="setOutcome(axis.key, n)">{{ n }}</button>
              }
            </div>
          </div>
        }
      </div>
    </div>

    <div class="field">
      <label class="field-label">{{ t().scenarios.confidenceLabel }} — {{ confidence() }}%</label>
      <div class="confidence-row">
        <input type="range" class="confidence-slider" min="0" max="100" step="5"
          [ngModel]="confidence()" (ngModelChange)="confidence.set(+$event)" name="confidence" />
        <span class="confidence-value">{{ confidence() }}%</span>
      </div>
    </div>

    <div class="sheet-actions">
      <button type="button" class="btn-ghost" (click)="cancel.emit()">{{ t().common.cancel }}</button>
      <button type="submit" class="btn-primary" [disabled]="!isValid">{{ t().scenarios.addBtn }}</button>
    </div>
  </form>
</div>
