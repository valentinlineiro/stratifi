<div class="sheet-backdrop" (click)="cancel.emit()"></div>

<div class="sheet">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">{{ t().journal.newTitle }}</h2>

  <form class="sheet-form" (ngSubmit)="submit()">
    @if (!preselectedDecisionId()) {
      <div class="field">
        <label class="field-label" for="decision">{{ t().scenarios.decision }}</label>
        <select id="decision" class="field-input field-select"
          [ngModel]="decisionId()" (ngModelChange)="onDecisionChange($event)" name="decisionId">
          <option value="" disabled>{{ t().common.selectDecision }}</option>
          @for (d of decisions(); track d.id) {
            <option [value]="d.id">{{ d.title }}</option>
          }
        </select>
      </div>
    }

    @if (availableScenarios().length > 0) {
      <div class="field">
        <label class="field-label" for="scenario">{{ t().journal.chosenScenario }}</label>
        <select id="scenario" class="field-input field-select"
          [ngModel]="scenarioId()" (ngModelChange)="scenarioId.set($event)" name="scenarioId">
          <option value="">{{ t().common.none }}</option>
          @for (s of availableScenarios(); track s.id) {
            <option [value]="s.id">{{ s.title }}</option>
          }
        </select>
      </div>
    }

    <div class="field">
      <p class="hint-text">{{ t().journal.regretPrompt }}</p>
    </div>

    <div class="field">
      <label class="field-label" for="reflection">{{ t().journal.reflectionLabel }}</label>
      <textarea id="reflection" class="field-input field-textarea"
        [placeholder]="t().journal.reflectionPlaceholder"
        [ngModel]="reflection()" (ngModelChange)="reflection.set($event)" name="reflection" rows="3">
      </textarea>
    </div>

    <div class="field">
      <label class="field-label">{{ t().journal.feelingLabel }}</label>
      <div class="regret-row">
        @for (opt of regretOptions(); track opt.score) {
          <button type="button" class="regret-btn"
            [class.active]="regretScore() === opt.score"
            (click)="regretScore.set(regretScore() === opt.score ? null : opt.score)">
            {{ opt.emoji }}
            <span class="regret-label">{{ opt.label }}</span>
          </button>
        }
      </div>
    </div>

    <div class="field">
      <label class="field-label">{{ t().outcomes.actualTitle }}</label>
      <div class="axis-rows">
        @for (axis of axes; track axis.key) {
          <div class="axis-row">
            <span class="axis-label">{{ $any(t().outcomes)[axis.key] }}</span>
            <div class="score-dots">
              @for (n of scores; track n) {
                <button type="button" class="score-dot"
                  [class.active]="actualOutcomes()[axis.key] === n"
                  (click)="setActualOutcome(axis.key, n)">{{ n }}</button>
              }
            </div>
          </div>
        }
      </div>
    </div>

    <div class="sheet-actions">
      <button type="button" class="btn-ghost" (click)="cancel.emit()">{{ t().common.cancel }}</button>
      <button type="submit" class="btn-primary" [disabled]="!isValid">{{ t().journal.saveBtn }}</button>
    </div>
  </form>
</div>
