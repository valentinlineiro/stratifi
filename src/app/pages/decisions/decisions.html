<div class="page">
  <div class="page-header">
    <h1 class="page-title">Decisions</h1>
    <button class="btn-icon" aria-label="New decision" (click)="showSheet.set(true)">
      <span class="material-symbols-rounded">add</span>
    </button>
  </div>

  @if (decisions().length === 0) {
    <div class="empty-state">
      <span class="material-symbols-rounded empty-icon">fork_right</span>
      <p class="empty-title">No decisions yet</p>
      <p class="empty-sub">Tap + to start modeling a life decision</p>
    </div>
  } @else {
    <div class="decisions-list">
      @for (decision of decisions(); track decision.id) {
        <app-decision-card
          [decision]="decision"
          (delete)="onDelete($event)"
        />
      }
    </div>
  }
</div>

@if (showSheet()) {
  <app-new-decision-sheet
    (confirm)="onAdd($event)"
    (cancel)="showSheet.set(false)"
  />
}
