<div class="sheet-backdrop" (click)="cancel.emit()"></div>

<div class="sheet">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">{{ t().decisions.newTitle }}</h2>

  <form class="sheet-form" (ngSubmit)="submit()">
    <div class="field">
      <label class="field-label" for="title">{{ t().decisions.question }}</label>
      <input
        id="title"
        class="field-input"
        type="text"
        [placeholder]="t().decisions.questionPlaceholder"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        name="title"
        autofocus
      />
    </div>

    <div class="field">
      <label class="field-label" for="desc">{{ t().decisions.context }}</label>
      <textarea
        id="desc"
        class="field-input field-textarea"
        [placeholder]="t().decisions.contextPlaceholder"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        name="description"
        rows="3"
      ></textarea>
    </div>

    <div class="sheet-actions">
      <button type="button" class="btn-ghost" (click)="cancel.emit()">{{ t().common.cancel }}</button>
      <button type="submit" class="btn-primary" [disabled]="!title().trim()">{{ t().decisions.createBtn }}</button>
    </div>
  </form>
</div>
