<article class="card" appSwipeDelete (deleted)="delete.emit(decision().id)">
  <a class="card-body" [routerLink]="['/decisions', decision().id]">
    <h2 class="card-title">{{ decision().title }}</h2>
    @if (decision().description) {
      <p class="card-desc">{{ decision().description }}</p>
    }
  </a>
  <footer class="card-footer">
    <div class="footer-left">
      <span class="card-date">{{ decision().createdAt | date: 'MMM d, y' }}</span>
      <span class="status-badge status-badge--{{ decision().status }}">{{ t().status[decision().status] }}</span>
    </div>
    <button
      class="btn-delete"
      aria-label="Delete decision"
      (click)="delete.emit(decision().id)"
    >
      <span class="material-symbols-rounded">delete</span>
    </button>
  </footer>
</article>
